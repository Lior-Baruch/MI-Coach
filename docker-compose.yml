# MI Coach: vLLM model server + FastAPI/Gradio app.
#
#   MODEL_ID=meta-llama/Llama-3.2-1B HF_TOKEN=... docker compose up
#
# Needs the NVIDIA Container Toolkit for GPU access. Adapters are mounted from
# assets/adapters (not baked into any image).

services:
  vllm:
    image: vllm/vllm-openai:v0.25.0
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_ID: ${MODEL_ID:-meta-llama/Llama-3.2-1B}
      VLLM_WSL2_ENABLE_PIN_MEMORY: "1"   # harmless off WSL2; required on it
    volumes:
      # Whole assets tree (read-only) so the adapter symlinks resolve; every
      # iteration under assets/adapters/ is registered by the entrypoint.
      - ./assets:/assets:ro
      - ./scripts/vllm_entrypoint.sh:/vllm_entrypoint.sh:ro
      - hf-cache:/root/.cache/huggingface
    entrypoint: ["bash", "/vllm_entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      VLLM_URL: http://vllm:8000/v1
      DEFAULT_MODEL: mi-coach-pto-iter10
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}   # enables live judge/report/demo (from .env)
    depends_on:
      vllm:
        condition: service_healthy

volumes:
  hf-cache:
